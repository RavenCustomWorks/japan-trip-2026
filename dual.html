<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operation J · Japan 2026</title>
  <style>
    :root {
      --bg: #050711;
      --surface: #101321;
      --surface-soft: #15192a;
      --card: #181c30;
      --accent: #ff4b7b;
      --accent2: #3f8cff;
      --accent-teal: #31d4c4;
      --accent-gold: #f9c851;
      --text: #f5f7ff;
      --muted: #8b90b5;
      --border: #292f4a;
      --radius: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
      "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1b2140 0, #050711 60%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .app-shell {
      max-width: 1040px;
      margin: 0 auto;
      padding-bottom: 32px;
    }

    header.topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(18px);
      background: rgba(5,7,17,0.96);
      border-bottom: 1px solid rgba(76,87,144,0.6);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      gap: 10px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-mark {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 20%, #fff 0, #ff4b7b 40%, #6610f2 85%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 0 2px rgba(255,255,255,0.08),
        0 10px 24px rgba(0,0,0,0.7);
    }

    .logo-mark span {
      font-size: 13px;
      font-weight: 800;
      color: #050711;
    }

    .logo-main {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .topbar-right {
      display:flex;
      gap:8px;
      align-items:center;
    }

    .badge-soft {
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      color: var(--accent-teal);
      background: rgba(49,212,196,0.12);
      border: 1px solid rgba(49,212,196,0.4);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .badge-soft-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--accent-teal);
      box-shadow: 0 0 0 4px rgba(49,212,196,0.25);
    }

    .lang-toggle {
      border-radius:999px;
      border:1px solid rgba(120,130,190,0.8);
      padding:3px;
      background:#080b1b;
      display:flex;
      align-items:center;
      gap:2px;
      font-size:11px;
    }

    .lang-btn {
      border-radius:999px;
      padding:3px 7px;
      border:none;
      background:transparent;
      color:var(--muted);
      cursor:pointer;
    }

    .lang-btn.active {
      background:var(--accent2);
      color:#fff;
    }

    .nav-strip {
      display: flex;
      gap: 6px;
      padding: 0 16px 10px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .nav-strip::-webkit-scrollbar { display: none; }

    .nav-btn {
      border-radius: 999px;
      border: 1px solid rgba(110,121,180,0.7);
      padding: 5px 12px;
      font-size: 12px;
      background: radial-gradient(circle at top left,#1d2239,#0c0f1f);
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.18s ease-out;
    }

    .nav-btn span { font-size: 13px; }

    .nav-btn.active,
    .nav-btn:hover {
      border-color: var(--accent);
      color: #fff;
      background: radial-gradient(circle at top left,#ff4b7b,#3f264b);
      box-shadow: 0 10px 24px rgba(0,0,0,0.6);
    }

    .hero {
      padding: 20px 16px 10px;
    }

    .hero-inner {
      border-radius: 22px;
      padding: 18px 16px 20px;
      border: 1px solid rgba(92,104,170,0.8);
      background:
        radial-gradient(circle at 0 0, rgba(255,75,123,0.22) 0, transparent 55%),
        radial-gradient(circle at 100% 0, rgba(63,140,255,0.22) 0, transparent 60%),
        linear-gradient(135deg,#151a2d,#070915);
      box-shadow: 0 16px 40px rgba(0,0,0,0.7);
    }

    .hero-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .hero-flag {
      font-size: 32px;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,0.8));
    }

    .hero-title-block { flex: 1; }

    .hero-title {
      font-size: clamp(22px, 4vw, 28px);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: linear-gradient(90deg,#fff,#f9c851,#ff4b7b);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .hero-sub { margin-top: 4px; font-size: 13px; color: var(--muted); }

    .hero-meta-row {
      margin-top: 12px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .hero-pill {
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 12px;
      background: rgba(8,11,26,0.9);
      border: 1px solid rgba(98,110,177,0.8);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #e1e5ff;
    }

    .hero-pill strong {
      color: var(--accent-gold);
      font-weight: 600;
    }

    .hero-tagline {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .hero-row {
      margin-top: 14px;
      display:flex;
      flex-wrap:wrap;
      gap:14px;
    }

    .stat-block { min-width: 72px; }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      margin-top: 2px;
    }

    .stat-value span { color: var(--accent-teal); }

    .hero-note {
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted);
    }

    .section {
      display:none;
      margin: 10px 16px 0;
    }

    .section.active { display:block; }

    .section-inner {
      border-radius: 20px;
      padding: 16px 14px 20px;
      background: linear-gradient(150deg,#0b0f1d,#050711);
      border: 1px solid var(--border);
      box-shadow: 0 10px 26px rgba(0,0,0,0.7);
    }

    .section-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:14px;
    }

    .section-title {
      font-size:15px;
      font-weight:700;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .section-title span { font-size:18px; }

    .section-caption {
      font-size:11px;
      color:var(--muted);
    }

    /* Overview */

    .overview-grid { display:grid; gap:12px; }

    .overview-route {
      border-radius: 16px;
      padding: 12px;
      background: radial-gradient(circle at top left,#1d2236,#101321);
      border:1px solid rgba(82,93,154,0.8);
    }

    .overview-route-title {
      font-size:13px;
      font-weight:600;
      letter-spacing:0.06em;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:8px;
    }

    .timeline-row {
      display:flex;
      gap:8px;
      align-items:flex-start;
      font-size:13px;
      margin-bottom:6px;
    }

    .timeline-chip {
      min-width:52px;
      text-align:center;
      border-radius:999px;
      padding:3px 8px;
      font-size:11px;
      font-weight:600;
      letter-spacing:0.08em;
      text-transform:uppercase;
    }

    .chip-tokyo { background: rgba(63,140,255,0.18); border:1px solid rgba(63,140,255,0.7); color:#96b8ff; }
    .chip-nachi { background: rgba(255,75,123,0.18); border:1px solid rgba(255,75,123,0.7); color:#ff9ab9; }
    .chip-kyoto { background: rgba(249,200,81,0.16); border:1px solid rgba(249,200,81,0.7); color:#f9c851; }
    .chip-osaka { background: rgba(49,212,196,0.16); border:1px solid rgba(49,212,196,0.7); color:#7be3d5; }
    .chip-auto  { background: rgba(186,104,255,0.18); border:1px solid rgba(186,104,255,0.7); color:#d3b3ff; }

    .timeline-text { flex:1; color:#e3e6ff; }
    .timeline-text small { display:block; font-size:11px; color:var(--muted); }

    .note-card {
      border-radius:16px;
      padding:10px 12px;
      background:#111526;
      border:1px dashed rgba(139,144,181,0.8);
      font-size:12px;
      color:var(--muted);
      line-height:1.6;
    }

    .note-card strong { color:#f0f2ff; }

    .quick-actions {
      margin-top:10px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .pill-btn {
      border-radius:999px;
      border:1px solid rgba(102,113,173,0.8);
      padding:5px 10px;
      font-size:12px;
      background:#080b1b;
      color:#e1e5ff;
      display:inline-flex;
      align-items:center;
      gap:6px;
      cursor:pointer;
    }

    .pill-btn span { font-size:13px; }

    .pill-btn.primary {
      border-color:var(--accent);
      background:linear-gradient(130deg,#ff4b7b,#e83e8c,#f9c85133);
      color:#fff;
    }

    /* Itinerary */

    .day-card {
      border-radius:16px;
      border:1px solid var(--border);
      background:radial-gradient(circle at top,#1c2137,#101321);
      margin-bottom:8px;
      overflow:hidden;
    }

    .day-header {
      padding:8px 11px;
      display:flex;
      align-items:center;
      gap:10px;
      cursor:pointer;
    }

    .day-badge {
      min-width:70px;
      font-size:11px;
      font-weight:600;
      border-radius:999px;
      padding:4px 8px;
      text-align:center;
      text-transform:uppercase;
      letter-spacing:0.08em;
      background:rgba(28,32,54,0.9);
      border:1px solid rgba(111,124,183,0.9);
      color:#e2e6ff;
    }

    .day-main { flex:1; }

    .day-main-title {
      font-size:13px;
      font-weight:600;
    }

    .day-main-date {
      font-size:11px;
      color:var(--muted);
    }

    .day-chevron {
      font-size:16px;
      color:var(--muted);
      transition: transform 0.2s;
    }

    .day-card.open .day-chevron { transform: rotate(180deg); }

    .day-body {
      display:none;
      padding: 0 11px 10px;
      border-top:1px solid rgba(46,52,80,0.9);
      background:#0d101f;
    }

    .day-card.open .day-body { display:block; }

    .event {
      display:flex;
      gap:8px;
      padding:7px 0;
      border-bottom:1px solid rgba(26,31,54,0.9);
    }

    .event:last-child { border-bottom:none; }

    .event-icon {
      width:24px;
      text-align:center;
      font-size:18px;
    }

    .event-main h4 {
      font-size:13px;
      margin-bottom:2px;
    }

    .event-main p {
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
    }

    /* Weather */

    .weather-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
      gap:8px;
    }

    .weather-card {
      border-radius:14px;
      padding:8px 9px;
      background:#111526;
      border:1px solid rgba(47,55,90,0.9);
      font-size:12px;
    }

    .weather-city {
      font-size:13px;
      font-weight:600;
      margin-bottom:2px;
    }

    .weather-main {
      font-size:13px;
      color:#e3e6ff;
    }

    .weather-note {
      font-size:11px;
      color:var(--muted);
      margin-top:2px;
    }

    /* Checklist */

    .checklist-group {
      margin-bottom:10px;
      border-radius:14px;
      padding:8px 10px;
      background:#111526;
      border:1px solid rgba(47,55,90,0.9);
    }

    .checklist-title {
      font-size:12px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:0.08em;
      margin-bottom:4px;
    }

    .check-item {
      display:flex;
      align-items:flex-start;
      gap:8px;
      padding:5px 0;
      cursor:pointer;
    }

    .check-circle {
      width:18px;
      height:18px;
      border-radius:7px;
      border:2px solid rgba(81,93,145,0.9);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      color:var(--accent-teal);
    }

    .check-item.done .check-circle {
      background:var(--accent-teal);
      border-color:var(--accent-teal);
      color:#050711;
    }

    .check-text {
      font-size:12px;
      color:#e1e5ff;
    }

    .check-item.done .check-text {
      color:var(--muted);
      text-decoration:line-through;
    }

    .progress-line-wrap {
      font-size:11px;
      color:var(--muted);
      margin-bottom:8px;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .progress-line {
      flex:1;
      height:6px;
      border-radius:999px;
      background:#252b44;
      overflow:hidden;
    }

    .progress-fill {
      height:100%;
      width:0%;
      border-radius:inherit;
      background:linear-gradient(90deg,#31d4c4,#f9c851);
      transition:width 0.2s ease-out;
    }

    /* Notes */

    .note-preset {
      border-radius:14px;
      padding:8px 10px;
      background:#111526;
      border-left:3px solid var(--accent-teal);
      margin-bottom:6px;
      font-size:12px;
      color:var(--muted);
    }

    .note-preset strong { color:#f0f2ff; }

    .notes-area {
      margin-top:8px;
      width:100%;
      border-radius:14px;
      padding:8px 10px;
      border:1px solid rgba(54,64,108,0.9);
      background:#050711;
      color:var(--text);
      font-size:13px;
      min-height:120px;
      resize:vertical;
    }

    .notes-area:focus {
      outline:none;
      border-color:var(--accent-teal);
    }

    .notes-saved {
      margin-top:3px;
      font-size:11px;
      color:var(--accent-teal);
      display:none;
    }

    /* Cities */

    .city-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:8px;
    }

    .city-card {
      border-radius:16px;
      padding:10px 10px;
      background:#111526;
      border:1px solid rgba(47,55,90,0.9);
      font-size:12px;
      position:relative;
    }

    .city-icon { font-size:22px; margin-bottom:4px; }

    .city-name { font-size:14px; font-weight:600; }

    .city-meta { font-size:11px; color:var(--muted); margin-bottom:4px; }

    .city-tags {
      display:flex;
      flex-wrap:wrap;
      gap:4px;
      margin-top:4px;
    }

    .city-tag {
      font-size:11px;
      border-radius:999px;
      padding:2px 7px;
      border:1px solid rgba(80,92,150,0.9);
      color:#d0d4ff;
    }

    .city-nights {
      position:absolute;
      top:8px;
      right:8px;
      font-size:11px;
      color:var(--muted);
    }

    /* Maps */

    .maps-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:8px;
    }

    .map-card {
      border-radius:16px;
      padding:10px 10px;
      background:#111526;
      border:1px solid rgba(47,55,90,0.9);
      font-size:12px;
      display:block;
    }

    .map-title { font-size:13px; font-weight:600; margin-bottom:2px; }

    .map-desc { font-size:11px; color:var(--muted); }

    .map-arrow {
      margin-top:4px;
      font-size:12px;
      color:var(--accent-teal);
    }

    @media (max-width: 600px) {
      .hero-inner { padding:14px 12px 18px; }
      .section-inner { padding:14px 12px 18px; }
    }
  </style>
</head>
<body>
<div class="app-shell">

  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo">
        <div class="logo-mark"><span>J</span></div>
        <div>
          <div class="logo-main" id="logo-main">Operation J</div>
          <div class="logo-sub" id="logo-sub">Japan · July 12–28, 2026</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="badge-soft">
          <span class="badge-soft-dot"></span>
          <span id="badge-label">Itinerary v2</span>
        </div>
        <div class="lang-toggle">
          <button class="lang-btn active" data-lang="ru">RU</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
      </div>
    </div>
    <div class="nav-strip" id="nav-strip">
      <!-- кнопки навигации будут собраны из JS -->
    </div>
  </header>

  <section class="hero">
    <div class="hero-inner">
      <div class="hero-header">
        <div class="hero-flag">🇯🇵</div>
        <div class="hero-title-block">
          <div class="hero-title" id="hero-title"></div>
          <div class="hero-sub" id="hero-sub"></div>
          <div class="hero-meta-row" id="hero-meta"></div>
          <div class="hero-tagline" id="hero-tagline"></div>
        </div>
      </div>
      <div class="hero-row">
        <div class="stat-block">
          <div class="stat-label" id="stat-days-label"></div>
          <div class="stat-value"><span id="stat-days-value"></span></div>
        </div>
        <div class="stat-block">
          <div class="stat-label" id="stat-fests-label"></div>
          <div class="stat-value"><span id="stat-fests-value"></span></div>
        </div>
        <div class="stat-block">
          <div class="stat-label" id="stat-auto-label"></div>
          <div class="stat-value"><span id="stat-auto-value"></span></div>
        </div>
        <div class="stat-block">
          <div class="stat-label" id="stat-cities-label"></div>
          <div class="stat-value"><span id="stat-cities-value"></span></div>
        </div>
      </div>
      <div class="hero-note" id="hero-note"></div>
    </div>
  </section>

  <!-- Sections -->
  <section id="overview" class="section active">
    <div class="section-inner">
      <div class="section-header">
        <div class="section-title">
          <span>🏠</span><span id="overview-title"></span>
        </div>
        <div class="section-caption" id="overview-caption"></div>
      </div>
      <div class="overview-grid">
        <div class="overview-route">
          <div class="overview-route-title" id="overview-route-title"></div>
          <div id="overview-timeline"></div>
        </div>
        <div class="note-card" id="overview-note"></div>
        <div class="quick-actions" id="overview-actions"></div>
      </div>
    </div>
  </section>

  <section id="itinerary" class="section">
    <div class="section-inner">
      <div class="section-header">
        <div class="section-title">
          <span>📅</span><span id="itinerary-title"></span>
        </div>
        <div class="section-caption" id="itinerary-caption"></div>
      </div>
      <div id="days-container"></div>
    </div>
  </section>

  <section id="weather" class="section">
    <div class="section-inner">
      <div class="section-header">
        <div class="section-title">
          <span>🌡️</span><span id="weather-title"></span>
        </div>
        <div class="section-caption" id="weather-caption"></div>
      </div>
      <div class="note-card" id="weather-note"></div>
      <div class="weather-grid" id="weather-grid"></div>
    </div>
  </section>

  <section id="checklist" class="section">
    <div class="section-inner">
      <div class="section-header">
        <div class="section-title">
          <span>✅</span><span id="checklist-title"></span>
        </div>
        <div class="section-caption" id="checklist-caption"></div>
      </div>

      <div class="progress-line-wrap">
        <span id="progress-label"></span>
        <div class="progress-line">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>

      <div id="checklist-container"></div>
    </div>
  </section>

  <section id="cities" class="section">
    <div class="section-inner">
      <div class="section-header">
        <div class="section-title">
          <span>🏙️</span><span id="cities-title"></span>
        </div>
        <div class="section-caption" id="cities-caption"></div>
      </div>
      <div class="city-grid" id="city-grid"></div>
    </div>
  </section>

  <section id="maps" class="section">
    <div class="section-inner">
      <div class="section-header">
        <div class="section-title">
          <span>🗺️</span><span id="maps-title"></span>
        </div>
        <div class="section-caption" id="maps-caption"></div>
      </div>
      <div class="maps-grid" id="maps-grid"></div>
    </div>
  </section>

  function buildNav() {
    const navStrip = document.getElementById('nav-strip');
    navStrip.innerHTML = '';
    translations[currentLang].nav.forEach((item, idx) => {
      const btn = document.createElement('button');
      btn.className = 'nav-btn' + (idx === 0 ? ' active' : '');
      btn.setAttribute('data-section', item.id);
      btn.innerHTML = `<span>${item.icon}</span>${item.label}`;
      navStrip.appendChild(btn);
    });
    attachNavHandlers();
  }

  function attachNavHandlers() {
    const navButtons = document.querySelectorAll('.nav-btn');
    const sections = document.querySelectorAll('.section');

    function showSection(id) {
      sections.forEach(s => s.classList.toggle('active', s.id === id));
      navButtons.forEach(b => {
        const target = b.getAttribute('data-section');
        b.classList.toggle('active', target === id);
      });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    navButtons.forEach(btn => {
      btn.onclick = () => {
        const target = btn.getAttribute('data-section');
        if (target) showSection(target);
      };
    });

    // быстрые кнопки в overview
    const actions = document.querySelectorAll('[data-section-jump]');
    actions.forEach(btn => {
      btn.onclick = () => {
        const target = btn.getAttribute('data-section-jump');
        if (target) showSection(target);
      };
    });
  }
